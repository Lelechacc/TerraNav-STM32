<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM32 + LVGL 智能自行车码表 | 项目展示</title>
    <style>
        :root { 
            --bg-main: #F5F5F7;      
            /* ⚠️ 核心修复 1：把纯白改成半透明，让背景能透出来 */
            --card-bg: rgba(255, 255, 255, 0.65); 
            --text-main: #1D1D1F;    
            --text-muted: #86868B;   
            --accent-blue: #007AFF;  
            --border-color: rgba(210, 210, 215, 0.4); 
        }
        
        /* 亮色调、干净的 iMac 风格背景 */
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; 
            
            /* ⚠️ 核心修复 2：在这里加载你的图片当背景！ */
            background-color: var(--bg-main);
            background-image: url('images/2153816071994343424.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            
            color: var(--text-main); 
            line-height: 1.5; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased; 
        }

        .container { max-width: 1080px; margin: 0 auto; padding: 60px 30px; position: relative; z-index: 2; }
        
        /* 顶部标题 */
        header { text-align: left; padding-bottom: 50px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        h1 { 
            font-size: 2.5em; 
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 10px 0; 
            letter-spacing: -0.5px;
            text-shadow: 0 2px 15px rgba(255,255,255,0.8); /* 保证标题在背景上能看清 */
        }
        header p { color: var(--text-main); font-size: 1.2em; font-weight: 600; margin: 0; }
        .badges { margin: 25px 0 0 0; text-align: left; }
        .badges img { margin-right: 8px; height: 26px; border-radius: 4px; }
        
        /* 全功能演示 */
        .video-section { margin: 60px 0; text-align: center; }
        .video-box { 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15); 
            border: 1px solid rgba(255,255,255,0.5); 
            padding: 10px;
            display: inline-block; 
            max-width: 600px; 
            margin: 0 auto;
        }
        video { width: 100%; display: block; border-radius: 12px; }

        /* 通用章节标题 */
        h2 { 
            color: var(--text-main); 
            font-size: 2em;
            font-weight: 600;
            margin-top: 80px; 
            margin-bottom: 30px;
            text-align: left;
            letter-spacing: -0.2px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.8);
        }
        h3 { color: var(--text-main); margin-top: 0; font-size: 1.3em; font-weight: 600; }

        /* ⚠️ 核心修复 3：启用毛玻璃特效，让所有卡片高级起来 */
        .bento-item, .list-card, .tech-box, .grid-3-item {
            background: var(--card-bg) !important; 
            backdrop-filter: blur(25px) saturate(180%) !important; 
            -webkit-backdrop-filter: blur(25px) saturate(180%) !important; 
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.6) !important; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08) !important; 
            transition: all 0.3s ease; 
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin: 30px 0; }
        .bento-item { padding: 30px; text-align: center; }
        .bento-item:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.15) !important; }
        .bento-item img { width: 100%; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .bento-item p { font-size: 1.1em; color: var(--text-main); margin: 0; font-weight: 600; }

        .structured-list { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 30px; }
        .list-card { padding: 30px; }
        ul { padding-left: 18px; margin: 0; }
        li { margin-bottom: 12px; color: var(--text-main); font-size: 1.05em; font-weight: 500;}
        li b { color: var(--accent-blue); font-weight: 700;}

        .tech-box { padding: 25px; margin: 25px 0; }
        .tech-box h3 { color: var(--accent-blue); margin-bottom: 10px; font-weight: 800;}
        .tech-box p { color: var(--text-main); margin-bottom: 0; font-weight: 500;}
        code { background: rgba(0,122,255,0.06); padding: 4px 10px; border-radius: 6px; color: var(--accent-blue); font-family: monospace; font-weight: bold; }
        
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 30px 0; }
        .grid-3-item { padding: 20px; text-align: center; }
        .grid-3-item img { width: 100%; border-radius: 8px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .grid-3-item p { font-size: 0.95em; color: var(--text-main); margin: 0; font-weight: 600; }

        /* 🎵 苹果风音乐播放器小组件 */
        .music-widget {
            position: fixed; bottom: 30px; right: 30px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            padding: 10px 20px; border-radius: 50px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            z-index: 1000;
        }
        .music-info { font-size: 13px; font-weight: 600; color: #1d1d1f; display: flex; align-items: center; gap: 8px;}
        .dot { width: 8px; height: 8px; background: #30d158; border-radius: 50%; box-shadow: 0 0 8px #30d158; }
        .play-btn { 
            background: var(--accent-blue); color: white; border: none; 
            padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold;
        }

        footer { text-align: center; padding: 60px 0 30px; color: var(--text-main); font-size: 1em; font-weight: 600; border-top: 1px solid var(--border-color); margin-top: 80px;}
        footer a { color: var(--accent-blue); text-decoration: none; font-weight: 800; transition: 0.2s; }
        footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="music-widget">
    <div class="music-info"><div class="dot"></div>Sony WH-1000XM4 Hi-Res</div>
    <audio id="bg-music" loop>
        <source src="music/bg.mp3" type="audio/mpeg">
    </audio>
    <button onclick="toggleMusic()" id="music-btn" class="play-btn">播放</button>
</div>

<div class="container">
    <header>
        <h1>🚲 STM32 + LVGL 智能自行车码表</h1>
        <p>全栈嵌入式实践 | 从底层驱动到图形界面开发复盘</p>
        <div class="badges">
            <img src="https://img.shields.io/badge/Language-C-blue" alt="C">
            <img src="https://img.shields.io/badge/Platform-STM32-orange" alt="STM32">
            <img src="https://img.shields.io/badge/Framework-LVGL-green" alt="LVGL">
        </div>
    </header>

    <section class="video-section">
        <div class="video-box">
            <video controls poster="images/实物路书页面.jpg">
                <source src="images/demo_video.mp4" type="video/mp4">
                您的浏览器不支持播放该视频。
            </video>
        </div>
    </section>

    <section>
        <h2>🚀 核心亮点</h2>
        <div class="grid">
            <div class="bento-item">
                <img src="images/语音切换.gif" alt="语言切换">
                <p>中英文静态翻译无缝切换</p>
            </div>
            <div class="bento-item">
                <img src="images/主题一键切换.gif" alt="主题切换">
                <p>深色/浅色模式动态重绘UI</p>
            </div>
        </div>
    </section>

    <section>
        <h2>⚙️ 功能与架构</h2>
        <div class="structured-list">
            <div class="list-card">
                <h3>主要功能</h3>
                <ul>
                    <li><b>基础交互</b>：基于 LVGL 实现彩色 UI。</li>

                    <li><b>骑行数据</b>：实时显示速度、电量、卫星数等。</li>
                    <li><b>地图导航</b>：支持局部 GPS 地图滚动与路书。</li>
                </ul>

            <div class="list-card">
                <h3>硬件选型</h3>
                <ul>
                    <li><b>主控</b>：STM32F405 / STM32H750</li>
                    <li><b>屏幕</b>：240*320 TFT (ST7
